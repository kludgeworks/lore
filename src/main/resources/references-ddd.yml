# DDD / architecture foundation — code-browsing tools for the `ddd` profile.
# Profiles that build on DDD (e.g. `embabel` via `guide.extends: ddd`) inherit these in
# addition to their own; the Embabel framework/example repos live in references-embabel.yml.
# ─── Architecture & DDD Tools ─────────────────────────────────────────────────────────

- fqn: com.embabel.coding.tools.git.GitHubRepository
  url: https://github.com/spring-projects/spring-modulith.git
  description: Spring Modulith — opinionated application modularisation for Spring Boot.

- fqn: com.embabel.coding.tools.git.GitHubRepository
  url: https://github.com/xmolecules/jmolecules.git
  description: jMolecules — libraries to express architectural abstractions in Java.

- fqn: com.embabel.coding.tools.git.GitHubRepository
  url: https://github.com/xmolecules/jmolecules-integrations.git
  description: jMolecules Integrations — framework integrations for jMolecules.

- fqn: com.embabel.coding.tools.git.GitHubRepository
  url: https://github.com/TNG/ArchUnit.git
  description: ArchUnit — architecture testing library for Java.

- fqn: com.embabel.coding.tools.git.GitHubRepository
  url: https://github.com/ZenWave360/spring-modulith-events-spring-cloud-stream.git
  description: Spring Modulith event externalizer over Spring Cloud Stream (Kafka/Rabbit, JSON/Avro).

- fqn: com.embabel.coding.tools.git.GitHubRepository
  url: https://github.com/apple/rules_pkl.git
  description: Apple's Bazel rules for the Pkl configuration language.

- fqn: com.embabel.coding.tools.git.GitHubRepository
  url: https://github.com/bazelbuild/rules_jvm_external.git
  description: Bazel rules for fetching and working with JVM dependencies.
