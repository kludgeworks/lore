guide:
  references-file: references-ddd.yml

  # Branding/voice for this profile. Consumed by the system prompt
  # (guide_system.jinja / elements/references.jinja) via the template model.
  # NOTE: This profile currently bundles both DDD/architecture and Embabel content
  # as a short-term fix (see ## hacky fix comments in supplementary/references).
  # A proper fix will add content inheritance to guide.extends so embabel and ddd
  # profiles can each own their content without duplication.
  domain:
    name: Embabel & Domain-Driven Design
    description: >-
      The Embabel agent framework for the JVM, built on Domain-Driven Design,
      the Sliced Onion architecture and event-driven modular monoliths with
      Spring Modulith
    references:
      # Embabel framework
      - "Embabel documentation: Use the appropriate tools to answer questions"
      - "embabel-agent: The core agent framework, used to check API details"
      - "embabel-agent-examples: Excellent source of API usage examples"
      # DDD / architecture
      - "Spring Modulith: opinionated modularisation and application events for Spring Boot"
      - "jMolecules: express DDD and architecture abstractions explicitly in Java/Kotlin"
      - "ArchUnit: enforce module boundaries and dependency rules as executable tests"
      - "ddd-by-examples/library and xsreality/spring-modulith-with-ddd: idiomatic Java DDD sample apps"
    tool-guidance: >-
      Tools with docs_ in the name load curated documentation and articles
      covering both Embabel and DDD/Spring Modulith — usually your starting
      point. Tools with git_ in the name load source from the Embabel framework,
      reference repositories and example applications.
    pronunciations:
      - '"Embabel" → "embaybel", "Embabel''s" → "Embaybel''s"'
      - '"GOAP" → "göpe"'
      - '"jMolecules" → "jay-molecules"'
      - '"jQAssistant" → "jay-Q-assistant"'
      - '"ArchUnit" → "arch-unit"'
      - '"DDD" → "dee-dee-dee"'

  content:
    # This profile does not track a versioned documentation set. Override the
    # base config's Embabel docs (application.yml) to an empty version list so
    # nothing from docs.embabel.com is ingested and no version filter is applied to DDD chat.

    supplementary:
      # @odrotbohm — architecture & Spring
      - https://odrotbohm.de/2025/12/rethinking-spring-application-integration-testing/
      - https://odrotbohm.de/2025/11/jmolecules-2.0-stereotypical/
      - https://odrotbohm.de/2024/09/the-instability-abstractness-relationsship-an-alternative-view/
      - https://odrotbohm.de/2023/07/sliced-onion-architecture/
      - https://odrotbohm.github.io/2016/10/evolving-distributed-systems/
      - https://odrotbohm.github.io/2016/04/benefits-of-hypermedia/
      - https://odrotbohm.github.io/2013/01/whoops-where-did-my-architecture-go/
      - https://odrotbohm.github.io/2021/04/Spring-RESTBucks-in-2021/
      # @martinfowler
      - https://martinfowler.com/bliki/BoundedContext.html
      - https://martinfowler.com/bliki/DomainDrivenDesign.html
      - https://martinfowler.com/bliki/DDD_Aggregate.html
      - https://martinfowler.com/eaaDev/DomainEvent.html
      - https://martinfowler.com/eaaDev/EventNarrative.html
      # Foundational DDD — Evans reference (PDF; no clean HTML/markdown equivalent exists)
      - https://www.domainlanguage.com/wp-content/uploads/2016/05/DDD_Reference_2015-03.pdf
      # Vernon — Effective Aggregate Design (3 direct PDFs; the landing page has no inline text)
      - https://www.dddcommunity.org/wp-content/uploads/files/pdf_articles/Vernon_2011_1.pdf
      - https://www.dddcommunity.org/wp-content/uploads/files/pdf_articles/Vernon_2011_2.pdf
      - https://www.dddcommunity.org/wp-content/uploads/files/pdf_articles/Vernon_2011_3.pdf
      # Spring Modulith docs
      - https://docs.spring.io/spring-modulith/reference/
      - https://docs.spring.io/spring-modulith/reference/verification.html
      - https://docs.spring.io/spring-modulith/reference/events.html
      # Events
      - https://spring.io/blog/2023/09/22/simplified-event-externalization-with-spring-modulith
      - https://www.baeldung.com/spring-modulith-event-externalization
      - https://microservices.io/patterns/data/domain-event.html
      - https://microservices.io/patterns/data/transactional-outbox.html
      # Tooling docs
      - https://www.archunit.org/userguide/html/000_Index.html
      - https://jqassistant.org/

      ## hacky fix to get things working for now copy from application-embabel.
      - https://raw.githubusercontent.com/liberation-data/drivine4j/refs/heads/main/README.md
        # @springrod blog posts
      - https://medium.com/@springrod/embabel-a-new-agent-platform-for-the-jvm-1c83402e0014
      - https://medium.com/@springrod/production-ready-gen-ai-beyond-the-python-prototype-439bf213a8c0
      - https://medium.com/@springrod/building-reliable-agentic-systems-part-i-b056d5b59392
      - https://medium.com/@springrod/the-embabel-vision-967654f13793
      - https://medium.com/@springrod/ai-for-your-gen-ai-how-and-why-embabel-plans-3930244218f6
      - https://medium.com/@springrod/build-better-agents-in-java-vs-python-embabel-vs-langgraph-f7951a0d855c
      - https://medium.com/@springrod/ground-your-ai-transformation-on-what-works-today-bfc525418118
      - https://medium.com/@springrod/from-alchemy-to-engineering-building-type-safe-gen-ai-applications-with-embabel-c3d89b7c989f
      - https://medium.com/@springrod/building-a-chatbot-with-embabel-agentic-rag-b26a8346cb16
      - https://medium.com/@springrod/rethinking-rag-pipelines-are-the-past-agentic-is-the-future-77c887414621
      - https://medium.com/@springrod/dont-talk-english-to-your-llm-ecbfe954bea1
      - https://medium.com/@springrod/why-you-should-use-local-models-a3fce1124c94
      - https://medium.com/@springrod/you-can-build-better-ai-agents-in-java-than-python-868eaf008493
      - https://medium.com/@springrod/embabel-year-end-update-building-the-best-agent-framework-25ed98728e79
      - https://medium.com/@springrod/building-stateful-ai-agents-how-to-create-interactive-mcp-tools-with-embabel-0dfbd3037cf7
      - https://medium.com/@springrod/context-engineering-needs-domain-understanding-b4387e8e4bf8
      - https://medium.com/the-composition/software-that-writes-and-evolves-software-953578a6fc36
        # Embabel publication
      - https://medium.com/embabel/agent-memory-is-not-a-greenfield-problem-ground-it-in-your-existing-data-9272cabe1561
        # @jasper.blues / Embabel publication
      - https://medium.com/embabel/from-docs-to-dialog-2b613901db60
      - https://medium.com/embabel/the-very-slowly-ticking-time-bomb-in-your-graph-persistence-stack-6da1a8da9515
      - https://medium.com/embabel/the-voice-the-word-and-the-wheel-d6e2ef2ab26e

  repositories:
    - url: https://github.com/spring-projects/spring-ai.git
      tag: v1.1.1   # library — keep in lockstep with spring-ai.version in pom.xml
    - url: https://github.com/odrotbohm/spring-restbucks.git   # no releases → tracks main
    - url: https://github.com/odrotbohm/arch-evident-spring.git
      tag: steps/7   # workshop repo — pin the final step (its only stable refs)
    # The example/reference apps below publish no releases, so they track main intentionally
    # (per the convention in application.yml).
    - url: https://github.com/ddd-by-examples/library.git
    - url: https://github.com/xsreality/spring-modulith-with-ddd.git
    - url: https://github.com/xmolecules/jmolecules-examples.git
    - url: https://github.com/odrotbohm/cqrs-spring-modulith.git
    # from embabel config
    - url: https://github.com/embabel/shepherd.git
    - url: https://github.com/embabel/ragbot.git
    - url: https://github.com/embabel/embabel-agent-examples.git
