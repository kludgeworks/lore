server:
  port: 1337
  tomcat:
    threads:
      max: 50
      min-spare: 5
    # max-connections removed to use Tomcat default (8192)
    connection-timeout: 20s

spring:
  mvc:
    async:
      # Force SSE connections to timeout after 5 minutes to reap abandoned connections
      request-timeout: 300000
  # Force web application type (needed because Spring Shell is present)
  main:
    web-application-type: servlet
  output:
    ansi:
      enabled: always
  profiles:
    # Default active profile when SPRING_PROFILES_ACTIVE is not set
    active: neo4j
  ai:
    mcp:
      server:
        protocol: STREAMABLE
        keep-alive-interval: 15s

# Actuator endpoints for health checks and monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized

guide:

  cors:
    allowed-origins: ${GUIDE_CORS_ALLOWED_ORIGINS:}

  # If true, the IngestionRunner is active on startup. It only ingests when the store is empty, so
  # ingestion runs once on first startup and is skipped on subsequent restarts.
  reload-content-on-startup: true

  # Force re-ingestion even when the store is already populated. Directory ingestion is not
  # idempotent, so clear the store before enabling this or directory content will be duplicated.
  force-reload: false

  # Projects root: absolute path, or relative to process working directory (e.g. ./embabel-projects)
  projects-path: ./embabel-projects

  # Change to any filename from /src/main/resources/prompts/persona,
  # without the jina extension
  # You can add your own persona files to that directory
  default-persona: adaptive

  # Branding/voice injected into the system prompt. Each profile overrides this
  # (application-embabel.yml, application-ddd.yml). Generic fallback when no
  # profile-specific domain is set.
  domain:
    name: this knowledge base
    description: the documentation and source it has been given
    references: []
    tool-guidance: >-
      Tools with docs_ in the name load curated documentation and articles —
      usually your starting point. Tools with git_ in the name load source from
      reference repositories and example applications.

  # default-provider: OPENAI  # Auto-detected from env vars (OPENAI_API_KEY, ANTHROPIC_API_KEY, etc.)

  content-chunker:
    include-section-title-in-chunk: false
    max-chunk-size: 4000
    overlap-size: 200
    # Chunks per embedding API call. 50 is safe; increase for speed if no timeouts (max 2048 for OpenAI).
    embedding-batch-size: 50

  # Ingested via load-references (or on startup if reload-content-on-startup is true)
  content:
    versioned:
      base-url: https://docs.embabel.com/embabel-agent/guide/
      versions:
        - 0.4.0-SNAPSHOT

  # Route specific URL patterns through alternate fetchers.
  # Medium is handled programmatically by MediumArchiveContentFetcher
  # (registered in RagConfiguration), which walks per-author monthly RSS
  # archives to retrieve articles aged out of the main feed.
  fetch-routes: []

  # Local directories to ingest (full tree). Paths are absolute or relative to working directory.
  # Cloned repositories land in .workspace/repos automatically — add personal checkouts here sparingly.
  directories:
    - .workspace/repos

  # Remote Git repositories to shallow-clone and ingest on startup.
  # Use `tag:` to pin a library to a specific release; omit for example apps (tracks main).
  # Kept empty in the base config — populate via profiles (e.g. application-embabel.yml).
  repositories: []

  tool-groups:

  email:
    sendgrid-api-key: ${SENDGRID_API_KEY:}
    from-email: ${SENDGRID_FROM_EMAIL:noreply@embabel.com}
    frontend-url: ${FRONTEND_URL:http://localhost:3000}

  oauth:
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
      client-secret: ${GOOGLE_CLIENT_SECRET:}
      redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:3000/auth/callback/google}
    github:
      client-id: ${GITHUB_CLIENT_ID:}
      client-secret: ${GITHUB_CLIENT_SECRET:}
      redirect-uri: ${GITHUB_REDIRECT_URI:http://localhost:3000/auth/callback/github}


# RAG Adapter Configuration (use "guide" to enable real Guide chatbot, "fake" for testing)
rag:
  adapter:
    type: guide

embabel:
  chat:
    store:
      title-after-message-count: 6

  models:
    # Local ONNX embedding model (no API key needed). Must match the model the ONNX
    # auto-config registers (its default is all-MiniLM-L6-v2); both RAG and the chat
    # store resolve the default embedding service by this name.
    default-embedding-model: all-MiniLM-L6-v2

    # Fake LLM — real models are resolved per-user via BYOK (UserLlmResolver)
    default-llm: setup-required

  agent:

    platform:
      models:
        onnx:
          embeddings:
            cache-dir: ${user.home}/.embabel/models

    rag:
      graph:
        uri: ${NEO4J_URI:bolt://localhost:7687}
        username: ${NEO4J_USERNAME:neo4j}
        password: ${NEO4J_PASSWORD:brahmsian}
        max-chunk-size: 1500
        overlap-size: 200

    logging:
      personality: starwars


  shell:
    line-length: 140


logging:
  file:
    name: logs/lore.log
  logback:
    rollingpolicy:
      file-name-pattern: logs/lore.%d{yyyy-MM-dd}.%i.log.gz
      max-file-size: 50MB
      max-history: 10
      total-size-cap: 500MB
  level:
    com.embabel.agent.rag: INFO
    com.embabel.agent.rag.tools: DEBUG
    com.embabel.agent.rag.pipeline: DEBUG
    # Drivine logging
    org.drivine: WARN
    org.drivine.manager: DEBUG
    org.drivine.transaction: WARN
    # Chat store debugging
    com.embabel.chat.store: DEBUG
    # WebSocket and Chat logging
    org.springframework.web.socket: INFO
    org.springframework.messaging: INFO
    com.embabel.guide.chat: DEBUG

# Data-source below is used when the 'neo4j' profile is active (default)

database:
  dataSources:
    neo:
      type: NEO4J
      userName: ${NEO4J_USERNAME:neo4j}
      password: ${NEO4J_PASSWORD:brahmsian}
      host: ${NEO4J_HOST:localhost}
      port: 7687
      protocol: ${NEO4J_PROTOCOL:bolt}
      # Neo4j Community supports only the single default `neo4j` database, so all profiles share it.
      # (Per-profile isolated databases — e.g. lore_embabel / lore_ddd — would require Neo4j Enterprise.)
      databaseName: neo4j


