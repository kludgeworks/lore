# References shared for all users, in addition to RAG.
# These provide agent tool access (code browsing, API lookup) on demand.
#
# For eagerly-ingested content (blog posts, articles, docs),
# see guide.content.supplementary in application.yml.

# ─── Embabel Framework ────────────────────────────────────────────────────────

- fqn: com.embabel.coding.tools.git.GitHubRepository
  url: https://github.com/embabel/embabel-agent.git
  description: >
    Embabel agent framework implementation repo.
    Look to check code under embabel-agent-api.
    For questions related to framework internals, not usage examples.

- fqn: com.embabel.coding.tools.git.GitHubRepository
  url: https://github.com/embabel/embabel-chat-store.git
  description: >
    Embabel chat store implementation.
    Chat session persistence and history management.

- fqn: com.embabel.coding.tools.git.GitHubRepository
  url: https://github.com/embabel/embabel-agent-rag-neo-drivine.git
  description: >
    Embabel RAG Neo4j integration using Drivine.
    RAG vector store implementation backed by Neo4j.

- fqn: com.embabel.coding.tools.api.ApiReferenceProvider
  name: embabel-agent
  description: Embabel Agent API - use to check type signatures
  acceptedPackages:
    - com.embabel.agent
    - com.embabel.common

